<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Switcher Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>My GitHub Project</h1>
        <p>Click the red cross to change the image!</p>

        <div class="image-box" id="imageCard">
            <img src="default-pic.jpg" id="mainImage" alt="Default Profile">
            
            <button id="closeBtn" title="Remove & Change">&times;</button>
            
            <input type="file" id="imageInput" accept="image/*">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
